<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Chat Esportivo</title>

 <style>
    
      /*Reseta o padding padrão do navegador*/
        * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
        }

      /* cor de fundo da pagina toda */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1b2a;
      color: white;
        }
       
      /*container principal*/
    .app {
      display: flex;
      height: 100vh;
        }
        
      /* sidebar é a barra do lado*/
    .sidebar {
      width: 250px;
      background-color: #1b263b;
      padding: 20px;
      border-right: 2px solid #2c3e50;
       }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
       }

      /* cada esporte é um botão clicavel */
    .esporte-botao {
      background-color: #415a77;
      padding: 12px;
      margin-bottom: 10px; /* espaco entre os botoes */
      border-radius: 8px;
      cursor: pointer; /* muda o cursor pra maozinha */
      /* transition é animacao suave*/
      transition: background-color 0.3s;
      font-size: 16px;
      }

     /* quando passa o mouse em cima muda de cor */
    .esporte-botao:hover {
      background-color: #4ea8de; /* azul mais claro */
      }
       
      /* Area do chat */ 
    .chat-area {
      flex: 1; /* ocupa o resto do espaco */
      display: flex;
      flex-direction: column; /* coloca em coluna */
       }

      /* cabecalho do chat */
    .chat-header {
      background-color: #4ea8de;
      padding: 15px 20px;
      font-weight: bold;
      font-size: 18px;
      }

      /* onde as mensagens aparecem */
    #caixa-de-chat {
      flex: 1; 
      padding: 15px;
      overflow-y: auto; /* rolar quando encher */
      display: flex;
      flex-direction: column;
      gap: 8px; /* espaco entre mensagens */
       }

      /* estilo de TODA mensagem (user e bot) */
    .mensagem {
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 65%; /* nao deixa ficar muito largo */
      word-break: break-word; /* quebra palavras grandes */
      line-height: 1.4;
      }

      /* mensagem do USUARIO (lado direito) */
    .mensagem-usuario {
      background-color: #4ea8de;
      align-self: flex-end; /* joga pra direita */
      }

      /* mensagem do BOT (lado esquerdo) */
    .mensagem-bot {
      background-color: #415a77;
      align-self: flex-start; /* joga pra esquerda */
      }

      /* parte de baixo onde digita a mensagem */
    .area-de-input {
      display: flex;
      padding: 12px;
      background-color: #1b263b;
      gap: 8px; /* espaco entre input e botao */
      border-top: 1px solid #2c3e50;
       }

      /* a caixinha de texto */
    #campo-mensagem {
      flex: 1;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 15px;
      background-color: #0d1b2a;
      color: white;
      }

      /* placeholder do input */
    #campo-mensagem::placeholder {
      color: #888; 
      }

      /* botao de enviar */
    #botao-enviar {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #4ea8de;
      color: white;
      cursor: pointer; 
      font-size: 15px;
      font-weight: bold;
      transition: background-color 0.2s;
      }

      /* hover do botao */
    #botao-enviar:hover {
      background-color: #3a97cd; /* um pouco mais escuro */
       } 

  </style>
</head>

  <body>

      <!--ESTRUTURAPRINCIPAL DO APP -->
<div class="app">

  <!-- SIDEBAR COM OS ESPORTES -->
  <!-- cada div aqui é um esporte que o usuario pode clicar -->
  <div class="sidebar">
    <h2> <!--aqui vai a imagem dele-->JARVIS</h2>

    <!-- quando clicar chama a funcao escolherEsporte -->
    <div class="esporte-botao" onclick="escolherEsporte('Futebol')">
      ⚽ Futebol
    </div>

    <div class="esporte-botao" onclick="escolherEsporte('Basquete')">
      🏀 Basquete
    </div>

    <div class="esporte-botao" onclick="escolherEsporte('Futebol Americano')">
      🏈 Fut. Americano
    </div>

    <div class="esporte-botao" onclick="escolherEsporte('Tênis')">
      🎾 Tênis
    </div>

    <div class="esporte-botao" onclick="escolherEsporte('Vôlei')">
      🏐 Vôlei
    </div>

  </div>
  <!-- fim da sidebar -->

  <!-- AREA PRINCIPAL DO CHAT -->
  <div class="chat-area">

    <!-- cabecalho -->
    <div class="chat-header">
      <!--imagem deleee-->JARVIS - Assistente Esportivo
    </div>

    <!-- caixa onde as mensagens aparecem -->
    <!-- id="caixa-de-chat" pra poder achar com o getElementById -->
    <div id="caixa-de-chat">

      <!-- mensagem inicial do bot quando a pagina abre -->
      <div class="mensagem mensagem-bot">
        Olá! Eu sou o JARVIS <!--aqui talvez imagem dele-->Escolha um esporte ou me pergunte qualquer coisa!
      </div>

    </div>
    <!-- fim do chat -->

</style>
</head> 
</html>
