<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jarvis UI</title>
  <link rel="stylesheet" href="jarvis.css">
</head>

<body>

<div class="container">
  <div class="svg-frame">

    <!-- SVG 1 -->
    <svg style="--i:0;" viewBox="0 0 344 344">
      <circle cx="172" cy="172" r="138"
        stroke="#00ffff" stroke-width="2.5"
        stroke-dasharray="60 18 30 18 80 18 40 18"
        stroke-linecap="round"/>
    </svg>

    <!-- SVG 2 -->
    <svg style="--i:1;" viewBox="0 0 344 344">
      <g id="out2">
        <circle cx="172" cy="172" r="108"
          stroke="#ccee00" stroke-width="2"
          stroke-dasharray="50 15 25 15 65 15"
          stroke-linecap="round"/>
      </g>
    </svg>

    <!-- SVG 3 -->
    <svg style="--i:2;" viewBox="0 0 344 344">
      <g id="out3">
        <circle cx="172" cy="172" r="80"
          stroke="#00ffff" stroke-width="2"
          stroke-dasharray="40 14 20 14 55 14"/>
      </g>
    </svg>

    <!-- SVG 4 -->
    <svg style="--i:3;" viewBox="0 0 344 344">
      <g id="inner1">
        <circle cx="172" cy="172" r="55"
          stroke="#ddcc00" stroke-width="2"
          stroke-dasharray="30 12 18 12 40 12"/>
      </g>
    </svg>

    <!-- SVG 5 -->
    <svg style="--i:4;" viewBox="0 0 344 344">
      <g id="inner3">
        <circle cx="172" cy="172" r="35"
          stroke="#00ffff" stroke-width="2"
          stroke-dasharray="22 10 14 10"/>
      </g>
    </svg>

    <!-- Centro -->
    <svg style="--i:5;" viewBox="0 0 344 344">
      <g id="center">
        <circle id="center1" cx="172" cy="172" r="10"/>
      </g>
    </svg>

  </div>
</div>

</body>
</html>
